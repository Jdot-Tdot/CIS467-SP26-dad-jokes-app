services:
  # ---------- PostgreSQL Database ----------
  db:
    image: postgres:16-alpine
    container_name: dadjokes-db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: dadjokes
      POSTGRES_PASSWORD: dadjokes
      POSTGRES_DB: dadjokes

  # ---------- Express API ----------
  api:


  # ---------- React Frontend (served by nginx) ----------
  frontend:

# top level volume
volumes:
  pgdata: